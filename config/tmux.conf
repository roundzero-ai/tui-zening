# ── Status bar pinned to top ──────────────────────────────────────────────────
set -g status-position top
set -g status-interval 2

# ── Colors (match oh-my-posh blue theme) ─────────────────────────────────────
set -g status-style "bg=#1865f5,fg=#ffffff"
set -g status-left-length 60
set -g status-right-length 80

# Left: session name
set -g status-left "#[bg=#2343e2,fg=#ffffff,bold]  #S #[bg=#1865f5,fg=#2343e2]#[default] "

# Right: CPU | RAM | Date/Time
set -g status-right "#[bg=#00c7fc,fg=#000000] CPU: #{cpu_percentage} | RAM: #(~/.config/tmux/scripts/ram_usage.sh) #[bg=#ff8c94,fg=#000000] %I:%M:%S %p | %A #[default]"

# ── Window tabs ───────────────────────────────────────────────────────────────
set -g window-status-current-style "bg=#2343e2,fg=#ffffff,bold"
set -g window-status-style "bg=#1865f5,fg=#cccccc"
set -g window-status-format "  #I:#W  "
set -g window-status-current-format "  #I:#W  "

# ── General settings ─────────────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
set -g pane-base-index 1

# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'

# ── Initialize TPM (keep at very bottom) ─────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'
