# yazi.toml — tui_zening
# Reference: https://yazi-rs.github.io/docs/configuration/yazi
# Only override defaults; unset options use yazi's built-in values.

[mgr]
ratio         = [1, 3, 4]   # parent | current | preview column widths
sort_by       = "natural"   # natural sort (1, 2, 10 vs 1, 10, 2)
sort_sensitive = false
sort_reverse  = false
sort_dir_first = true       # directories before files
show_hidden   = false       # toggle with . in yazi
linemode      = "size"      # show file size on right side
scrolloff     = 5           # keep 5 files above/below cursor

[preview]
tab_size    = 4
max_width   = 600
max_height  = 900
image_filter = "lanczos3"  # best downscaling quality
image_quality = 75

[open]
# Use prepend_rules to add openers before defaults (see keymap.toml pattern)

[tasks]
micro_workers    = 10
macro_workers    = 5
bizarre_retry    = 3
image_alloc      = 536870912  # 512 MB image allocation limit
image_bound      = [0, 0]
suppress_preload = false
